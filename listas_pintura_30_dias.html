
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.wrap { padding: 1rem 0 2rem; font-family: var(--font-sans); }
.tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.5rem; }
.tab { padding: 7px 16px; font-size: 13px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: transparent; cursor: pointer; color: var(--color-text-secondary); transition: all 0.15s; }
.tab:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
.tab.active { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--color-border-primary); font-weight: 500; }
.section { margin-bottom: 1.5rem; }
.section-title { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-text-secondary); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 6px; }
.item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 10px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); font-size: 13px; color: var(--color-text-primary); line-height: 1.45; }
.item .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.item .sub { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
.badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 10px; margin-left: 6px; vertical-align: middle; font-weight: 500; }
.tip { font-size: 12px; color: var(--color-text-secondary); background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; margin-top: 1rem; border-left: 2px solid var(--color-border-secondary); }
</style>
<div class="wrap">
  <div class="tabs">
    <button class="tab active" onclick="show('tecnicas',this)">Técnicas</button>
    <button class="tab" onclick="show('material',this)">Material</button>
    <button class="tab" onclick="show('ideias',this)">Ideias para pintar</button>
  </div>
  <div id="content"></div>
</div>

function show(page, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if(el) el.classList.add('active');
  const p = pages[page];
  let html = '';
  p.sections.forEach(s => {
    html += `<div class="section"><div class="section-title">${s.title}</div><div class="items-grid">`;
    s.items.forEach(item => {
      const badge = item.badge ? `<span class="badge" style="background:${s.color}22;color:${s.color}">${item.badge}</span>` : '';
      const sub = item.sub ? `<div class="sub">${item.sub}</div>` : '';
      html += `<div class="item"><div class="dot" style="background:${s.color};margin-top:${item.sub?'5':'7'}px"></div><div><div>${item.name}${badge}</div>${sub}</div></div>`;
    });
    html += `</div></div>`;
  });
  html += `<div class="tip">${p.tip}</div>`;
  document.getElementById('content').innerHTML = html;
}
